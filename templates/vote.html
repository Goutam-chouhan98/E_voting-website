<!DOCTYPE html>
<html>
<head>
  <title>Select Your Candidate</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    function selectCandidate(rowId) {
      document.querySelectorAll('.candidate-row').forEach(r => r.classList.remove('selected'));
      document.getElementById(rowId).classList.add('selected');
      document.getElementById('selectedCandidate').value = rowId;
    }
  </script>
</head>
<body>
  <div class="container">
    <h2>Select Your Candidate</h2>
    <form method="POST" action="/submit_vote">
      <table>
        {% for c in candidates %}
        <tr id="{{ c.id }}" class="candidate-row" onclick="selectCandidate('{{ c.id }}')">
          <td><img src="{{ c.logo }}" class="logo"></td>
          <td>{{ c.party_name }}</td>
          <td>{{ c.candidate_name }}</td>
        </tr>
        {% endfor %}
      </table>
      <input type="hidden" id="selectedCandidate" name="candidate_id" required>
      <button type="submit">Submit Vote</button>
    </form>
  </div>
</body>
</html>
